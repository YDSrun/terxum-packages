name: Build Custom Bootstrap (com.terxum)

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: 'Architecture to build (e.g., aarch64, arm, x86_64)'
        required: true
        default: 'aarch64'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Maximize build space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false

      - name: Clone repository
        uses: actions/checkout@v4
        
      - name: Enable zram (Prevent Out Of Memory)
        uses: ./.github/actions/zram
        with:
          algorithm: zstd
          size: 16G
          priority: 100
          device_name: /dev/zram0
        
      - name: Build termux-package-builder docker image
        run: docker build -t ghcr.io/termux/package-builder:latest scripts/

      - name: Build custom bootstraps from source
        # 修正 Gradle 的 Android SDK 写权限和 repository.cfg 文件缺失问题
        run: |
          ./scripts/run-docker.sh bash -c "sudo mkdir -p ~/.android && sudo touch ~/.android/repositories.cfg && sudo chmod -R 777 ~/.android /home/builder/lib && ./scripts/build-bootstraps.sh --architectures ${{ github.event.inputs.architecture }}"
          
      - name: Upload bootstrap artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ github.event.inputs.architecture }}.zip
          path: "*.zip"
